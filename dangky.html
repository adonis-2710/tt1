<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="title-name">Tạo tài khoản</div>
        <form id="form-login">
            <div class="form-group" id="login-group-email">
                <label class="style-text green">Email</label>
                <input type="email" class="style-input" id="login-email" placeholder="example@email.com">
            </div>

            <div class="form-group" id="login-group-email">
                <label class="style-text green">Họ</label>
                <input type="text" class="style-input" id="family-name" placeholder="Nhập họ của bạn">
            </div>

            <div class="form-group" id="login-group-email">
                <label class="style-text green">Tên</label>
                <input type="text" class="style-input" id="your-name" placeholder="Nhập tên của bạn">
            </div>

            <button type="submit" class="btn-submit style-text"><a href="profile.html">Đăng ký ngay</a></button>

            <div class="auth-footer-contain style-text">
                <div class="auth-footer style-text">
                    Bạn đã có tài khoản? 
                    <a href="index.html"v class="green">Đăng nhập</a>
            </div>
        </form>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
