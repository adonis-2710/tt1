<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soạn thông báo</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Quicksand', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#eaf4fb,#dbeafe);
}

/* ===== MODAL ===== */
.modal{
    width:540px;
    background:#f8fafc;
    border-radius:30px;
    padding:30px;
    box-shadow:0 25px 60px rgba(0,0,0,0.15);
}

/* HEADER */
.modal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.modal-header h2{
    color:#1e3a5f;
}

.close{
    width:40px;
    height:40px;
    background:#e2e8f0;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

/* FORM */
.form-group{
    margin-bottom:18px;
}

label{
    font-size:12px;
    font-weight:700;
    color:#94a3b8;
    margin-bottom:6px;
    display:block;
}

input, select, textarea{
    width:100%;
    padding:14px;
    border-radius:18px;
    border:1px solid #e2e8f0;
    background:#f1f5f9;
    font-weight:600;
    outline:none;
}

textarea{
    height:120px;
    resize:none;
}

/* CHIPS */
.chips{
    background:#f1f5f9;
    padding:12px;
    border-radius:18px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.chip{
    padding:8px 14px;
    border-radius:20px;
    background:#fff;
    border:1px solid #e2e8f0;
    font-weight:600;
    cursor:pointer;
}

.chip.active{
    background:#1C4E75;
    color:white;
}

/* BUTTON */
.form-actions{
    display:flex;
    gap:15px;
    margin-top:25px;
}

.btn{
    flex:1;
    padding:15px;
    border-radius:20px;
    border:none;
    font-weight:700;
    cursor:pointer;
    font-size:14px;
}

/* cancel */
.btn.cancel{
    background:#e2e8f0;
    color:#475569;
}

/* submit */
.btn.submit{
    background:#1C4E75;
    color:white;
}

/* hover */
.btn:hover{
    transform:translateY(-2px);
    opacity:0.9;
    transition:0.2s;
}

</style>
</head>

<body>

<div class="modal">

    <!-- HEADER -->
    <div class="modal-header">
        <h2>Soạn thông báo mới</h2>
        <div class="close">✕</div>
    </div>

    <!-- TITLE -->
    <div class="form-group">
        <label>TIÊU ĐỀ THÔNG BÁO</label>
        <input type="text" placeholder="VD: Thông báo họp Ban tháng 5...">
    </div>

    <!-- TYPE -->
    <div class="form-group">
        <label>LOẠI TIN</label>
        <select>
            <option>Tin tức nội bộ</option>
            <option>Thông báo khẩn</option>
        </select>
    </div>

    <!-- CONTENT -->
    <div class="form-group">
        <label>NỘI DUNG CHI TIẾT</label>
        <textarea placeholder="Nội dung thông báo gửi đến các thành viên..."></textarea>
    </div>

    <!-- GROUP -->
    <div class="form-group">
        <label>GỬI ĐẾN NHÓM CHUYÊN MÔN</label>
        <div class="chips">
            <span class="chip active">Tất cả nhóm</span>
            <span class="chip">Web App</span>
            <span class="chip">Mobile App</span>
            <span class="chip">UI/UX Design</span>
        </div>
    </div>

    <!-- ROLE -->
    <div class="form-group">
        <label>GỬI ĐẾN VAI TRÒ</label>
        <div class="chips">
            <span class="chip active">Tất cả vai trò</span>
            <span class="chip">Trưởng ban</span>
            <span class="chip">Quản trị viên</span>
            <span class="chip">Thành viên</span>
            <span class="chip">Cộng tác viên</span>
        </div>
    </div>

    <!-- BUTTON -->
    <div class="form-actions">
        <button class="btn cancel">Hủy bỏ</button>
        <button class="btn submit">Đăng thông báo</button>
    </div>

</div>

</body>
</html>
